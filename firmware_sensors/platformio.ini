; PlatformIO Project Configuration File
; Target: Arduino Nano (ATmega328P)
; Role: SPI slave — reads MPU-9250 IMU via I2C, controls laser on D7

[env:nano]
platform = atmelavr
board = nanoatmega328
framework = arduino
lib_deps =
	electroniccats/MPU6050@^1.3.0
upload_protocol = arduino
upload_speed = 57600
upload_port = /dev/ttyUSB0
monitor_speed = 115200
extra_scripts = pre:scripts/kill_port.py
